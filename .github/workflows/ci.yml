name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_image_scan:
        description: "Build Docker images and scan them with Trivy on manual runs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  app-lint:
    name: App ESLint baseline
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint without new debt
        run: node scripts/eslint-baseline.mjs --max-errors 15 --max-warnings 45

  app-quality:
    name: App test and build
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: https://example.com
      NEXT_PUBLIC_SITE_URL: https://example.com
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      ADMIN_EMAIL: ci-admin@example.com
      ADMIN_PASSWORD: C1-placeholder-admin!
      WHATSAPP_SERVICE_SECRET: ci-placeholder-whatsapp-secret-32-chars
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Test
        run: npm run test:run --if-present

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build --if-present

  app-audit:
    name: App npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  whatsapp-quality:
    name: WhatsApp build and audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/whatsapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/whatsapp/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: "true"

  image-scan:
    name: Docker image scan
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.run_image_scan == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=https://example.com \
            --build-arg NEXT_PUBLIC_SITE_URL=https://example.com \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=https://example.supabase.co \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=ci-placeholder \
            -t bordadeiras-app:ci .

      - name: Scan app image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bordadeiras-app:ci
          vulnerability-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Build WhatsApp image
        run: docker build -f services/whatsapp/Dockerfile -t bordadeiras-whatsapp:ci .

      - name: Scan WhatsApp image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bordadeiras-whatsapp:ci
          vulnerability-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
