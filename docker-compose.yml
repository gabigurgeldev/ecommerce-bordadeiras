# Desenvolvimento local — publica portas no host. Em VPS use docker-compose.prod.yml
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      whatsapp-service:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bordadeiras}
      MYSQL_USER: ${MYSQL_USER:-bordadeiras}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bordadeiras}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  whatsapp-service:
    build:
      context: .
      dockerfile: services/whatsapp/Dockerfile
    ports:
      - "4001:4001"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - whatsapp_auth:/app/data/auth
    restart: unless-stopped

  # Postal SMTP (uncomment and configure for production mail)
  # postal:
  #   image: postalserver/postal:latest
  #   ports:
  #     - "25:25"
  #     - "587:587"
  #   volumes:
  #     - postal_data:/opt/postal
  #   restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  minio_data:
  whatsapp_auth:
  # postal_data:
