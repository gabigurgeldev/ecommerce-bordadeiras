# Desenvolvimento local — publica portas no host. Em VPS use docker-compose.prod.yml
# Banco/API: Supabase self-hosted via NEXT_PUBLIC_SUPABASE_URL + service role — https://supabase.bordadeiras.cloud
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      whatsapp-service:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?Defina S3_ACCESS_KEY no .env local}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Defina S3_SECRET_KEY no .env local}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  whatsapp-service:
    build:
      context: .
      dockerfile: services/whatsapp/Dockerfile
    ports:
      - "127.0.0.1:4001:4001"
    env_file: .env
    volumes:
      - whatsapp_auth:/app/data/auth
    restart: unless-stopped

  # Postal SMTP (uncomment and configure for production mail)
  # postal:
  #   image: postalserver/postal:latest
  #   ports:
  #     - "25:25"
  #     - "587:587"
  #   volumes:
  #     - postal_data:/opt/postal
  #   restart: unless-stopped

volumes:
  redis_data:
  minio_data:
  whatsapp_auth:
  # postal_data:
